name: CTTranscriber
options:
  bundleIdPrefix: com.branch.ct-transcriber
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""

targets:
  CTTranscriber:
    type: application
    platform: macOS
    sources:
      - CTTranscriber
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.branch.ct-transcriber
        PRODUCT_NAME: CT Transcriber
        INFOPLIST_FILE: CTTranscriber/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.5.5"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_KEY_CFBundleDisplayName: CT Transcriber
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"

  CTTranscriberTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CTTranscriberTests
    dependencies:
      - target: CTTranscriber
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.branch.ct-transcriber.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: CTTranscriber
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CT Transcriber.app/Contents/MacOS/CT Transcriber"

  CTTranscriberUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - CTTranscriberUITests
    dependencies:
      - target: CTTranscriber
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.branch.ct-transcriber.uitests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: CTTranscriber
